<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Consolas', monospace;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    padding: 0 3vw;
    gap: 3vw;
  }

  /* ── Left: State Indicator ── */
  .state-section {
    display: flex;
    align-items: center;
    gap: 1.5vw;
    flex-shrink: 0;
  }

  .orb-container {
    position: relative;
    width: clamp(40px, 12vh, 80px);
    height: clamp(40px, 12vh, 80px);
  }

  .orb {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a4a6b, #0d1b2a);
    border: 2px solid rgba(100, 180, 255, 0.2);
    transition: all 0.5s ease;
  }

  .orb-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.5s ease;
  }

  /* State colors */
  .state-asleep .orb { background: radial-gradient(circle at 35% 35%, #1a1a2e, #0a0a14); border-color: rgba(80, 80, 100, 0.2); }
  .state-asleep .orb-ring { border-color: transparent; }

  .state-idle .orb { background: radial-gradient(circle at 35% 35%, #1a3a5c, #0d1b2a); border-color: rgba(70, 140, 220, 0.3); }
  .state-idle .orb-ring { border-color: rgba(70, 140, 220, 0.15); }

  .state-listening .orb { background: radial-gradient(circle at 35% 35%, #1a5c3a, #0a2a1a); border-color: rgba(70, 220, 140, 0.5); box-shadow: 0 0 20px rgba(70, 220, 140, 0.2); }
  .state-listening .orb-ring { border-color: rgba(70, 220, 140, 0.3); animation: pulse-ring 1.5s ease-in-out infinite; }

  .state-thinking .orb { background: radial-gradient(circle at 35% 35%, #5c4a1a, #2a1f0a); border-color: rgba(255, 200, 60, 0.5); box-shadow: 0 0 25px rgba(255, 200, 60, 0.2); }
  .state-thinking .orb-ring { border-color: rgba(255, 200, 60, 0.3); animation: spin-ring 2s linear infinite; }

  .state-speaking .orb { background: radial-gradient(circle at 35% 35%, #3a1a5c, #1a0a2a); border-color: rgba(180, 100, 255, 0.5); box-shadow: 0 0 30px rgba(180, 100, 255, 0.25); }
  .state-speaking .orb-ring { border-color: rgba(180, 100, 255, 0.3); animation: pulse-ring 0.8s ease-in-out infinite; }

  .state-dictating .orb { background: radial-gradient(circle at 35% 35%, #5c1a1a, #2a0a0a); border-color: rgba(255, 80, 80, 0.5); box-shadow: 0 0 20px rgba(255, 80, 80, 0.2); }
  .state-dictating .orb-ring { border-color: rgba(255, 80, 80, 0.3); animation: pulse-ring 1s ease-in-out infinite; }

  .state-label {
    font-size: clamp(0.9rem, 3vh, 1.6rem);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    white-space: nowrap;
    transition: color 0.5s;
  }

  .state-asleep .state-label { color: #555568; }
  .state-idle .state-label { color: #4a8cdc; }
  .state-listening .state-label { color: #46dc8c; }
  .state-thinking .state-label { color: #ffc83c; }
  .state-speaking .state-label { color: #b464ff; }
  .state-dictating .state-label { color: #ff5050; }

  /* ── Divider ── */
  .divider {
    width: 1px;
    height: 60%;
    background: linear-gradient(transparent, rgba(100, 180, 255, 0.15), transparent);
    flex-shrink: 0;
  }

  /* ── Right: Response Area ── */
  .response-section {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.5vh;
  }

  .response-header {
    font-size: clamp(0.5rem, 1.5vh, 0.7rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: rgba(160, 180, 220, 0.4);
  }

  .response-text {
    font-size: clamp(0.8rem, 2.8vh, 1.3rem);
    line-height: 1.4;
    color: #c8d4e8;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .response-text.visible { opacity: 1; }

  .response-time {
    font-size: clamp(0.45rem, 1.2vh, 0.6rem);
    color: rgba(160, 180, 220, 0.25);
    letter-spacing: 0.05em;
  }

  .no-response {
    font-size: clamp(0.7rem, 2vh, 1rem);
    color: rgba(160, 180, 220, 0.2);
    font-style: italic;
  }

  /* ── Waveform (visible when listening/speaking) ── */
  .waveform {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 3px;
    opacity: 0;
    transition: opacity 0.5s;
    padding-bottom: 0.5vh;
  }

  .waveform.active { opacity: 1; }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    transition: background 0.5s;
  }

  .state-listening .wave-bar { background: rgba(70, 220, 140, 0.4); }
  .state-speaking .wave-bar { background: rgba(180, 100, 255, 0.4); }
  .state-thinking .wave-bar { background: rgba(255, 200, 60, 0.3); }

  /* ── Offline banner ── */
  .offline-badge {
    position: fixed;
    top: 1vh;
    right: 2vw;
    font-size: clamp(0.45rem, 1.2vh, 0.6rem);
    color: rgba(255, 80, 80, 0.5);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.5s;
  }

  .offline-badge.show { opacity: 1; }

  /* ── Animations ── */
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.4; }
  }

  @keyframes spin-ring {
    0% { transform: rotate(0deg); border-style: dashed; }
    100% { transform: rotate(360deg); border-style: dashed; }
  }
</style>
</head>
<body>

<div class="state-section" id="stateSection">
  <div class="orb-container">
    <div class="orb-ring"></div>
    <div class="orb"></div>
  </div>
  <div class="state-label" id="stateLabel">Offline</div>
</div>

<div class="divider"></div>

<div class="response-section">
  <div class="response-header">Last Response</div>
  <div class="response-text" id="responseText"></div>
  <div class="no-response" id="noResponse">Waiting for Jarvis...</div>
  <div class="response-time" id="responseTime"></div>
</div>

<div class="waveform" id="waveform"></div>
<div class="offline-badge" id="offlineBadge">Bridge Offline</div>

<script>
  const BRIDGE_URL = 'http://127.0.0.1:9847/status';
  const POLL_MS = 1000;
  const WAVE_BARS = 32;

  const stateSection = document.getElementById('stateSection');
  const stateLabel = document.getElementById('stateLabel');
  const responseText = document.getElementById('responseText');
  const noResponse = document.getElementById('noResponse');
  const responseTime = document.getElementById('responseTime');
  const waveform = document.getElementById('waveform');
  const offlineBadge = document.getElementById('offlineBadge');

  let currentState = '';
  let waveAnimId = null;

  // Build waveform bars
  for (let i = 0; i < WAVE_BARS; i++) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    waveform.appendChild(bar);
  }
  const waveBars = waveform.querySelectorAll('.wave-bar');

  const STATE_LABELS = {
    asleep: 'Asleep',
    idle: 'Idle',
    listening: 'Listening',
    thinking: 'Thinking',
    speaking: 'Speaking',
    dictating: 'Dictating',
  };

  function animateWave() {
    const t = performance.now() / 1000;
    waveBars.forEach((bar, i) => {
      const norm = i / WAVE_BARS;
      const h = (Math.sin(t * 3 + norm * 8) * 0.5 + 0.5) *
                (Math.sin(t * 1.7 + norm * 5) * 0.3 + 0.7);
      bar.style.height = `${Math.max(2, h * 2.5)}vh`;
    });
    waveAnimId = requestAnimationFrame(animateWave);
  }

  function setWaveActive(active) {
    if (active && !waveAnimId) {
      waveform.classList.add('active');
      waveAnimId = requestAnimationFrame(animateWave);
    } else if (!active && waveAnimId) {
      waveform.classList.remove('active');
      cancelAnimationFrame(waveAnimId);
      waveAnimId = null;
    }
  }

  function formatTime(iso) {
    if (!iso) return '';
    try {
      const d = new Date(iso);
      const now = new Date();
      const diff = Math.floor((now - d) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return d.toLocaleDateString();
    } catch {
      return '';
    }
  }

  function update(data) {
    const state = data.state || 'asleep';
    offlineBadge.classList.remove('show');

    if (state !== currentState) {
      currentState = state;
      stateSection.className = `state-section state-${state}`;
      stateLabel.textContent = STATE_LABELS[state] || state;
      const showWave = state === 'listening' || state === 'speaking' || state === 'thinking';
      setWaveActive(showWave);
    }

    if (data.last_response) {
      responseText.textContent = data.last_response;
      responseText.classList.add('visible');
      noResponse.style.display = 'none';
      responseTime.textContent = formatTime(data.timestamp);
    } else {
      responseText.classList.remove('visible');
      noResponse.style.display = '';
      responseTime.textContent = '';
    }
  }

  function showOffline() {
    stateSection.className = 'state-section state-asleep';
    stateLabel.textContent = 'Offline';
    offlineBadge.classList.add('show');
    setWaveActive(false);
  }

  async function poll() {
    try {
      const res = await fetch(BRIDGE_URL);
      if (res.ok) {
        update(await res.json());
      } else {
        showOffline();
      }
    } catch {
      showOffline();
    }
    setTimeout(poll, POLL_MS);
  }

  poll();
</script>

</body>
</html>
